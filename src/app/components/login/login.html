<div class="min-h-screen bg-[#f3f2ef] flex flex-col">
  
  <!-- Header / Navbar simple (Style LinkedIn) -->
  <div class="w-full px-6 py-8 md:px-12">
    <a routerLink="/" class="flex items-center gap-2 group w-max">
      <div class="text-primary text-3xl font-black">
        🏗️ Bati<span class="text-slate-800">Connect</span>
      </div>
    </a>
  </div>

  <!-- Form Container -->
  <div class="flex-1 flex flex-col items-center justify-center px-4 pb-20">
    <div class="w-full max-w-[400px]">
      
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <h1 class="text-[32px] font-semibold text-slate-900 leading-tight mb-1 tracking-tight">S'identifier</h1>
        <p class="text-sm text-slate-500 mb-6 font-medium">Restez au courant de vos chantiers</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
          
          <div class="form-control">
            <!-- Floating label style input -->
            <input type="email" formControlName="email" placeholder="E-mail professionnel" 
                   class="w-full h-14 px-4 rounded-md border bg-transparent outline-none transition-all text-slate-900 font-medium placeholder-slate-500"
                   [ngClass]="{'border-red-500 focus:border-red-500 focus:ring-1 focus:ring-red-500': loginForm.get('email')?.invalid && loginForm.get('email')?.touched, 'border-slate-600 focus:border-primary focus:ring-1 focus:ring-primary': !(loginForm.get('email')?.invalid && loginForm.get('email')?.touched)}">
            <span *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-red-500 text-xs mt-1 ml-1 font-medium">Veuillez entrer une adresse e-mail valide.</span>
          </div>

          <div class="form-control">
            <input type="password" formControlName="password" placeholder="Mot de passe" 
                   class="w-full h-14 px-4 rounded-md border bg-transparent outline-none transition-all text-slate-900 font-medium placeholder-slate-500"
                   [ngClass]="{'border-red-500 focus:border-red-500 focus:ring-1 focus:ring-red-500': loginForm.get('password')?.invalid && loginForm.get('password')?.touched, 'border-slate-600 focus:border-primary focus:ring-1 focus:ring-primary': !(loginForm.get('password')?.invalid && loginForm.get('password')?.touched)}">
            <span *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-red-500 text-xs mt-1 ml-1 font-medium">Le mot de passe est requis.</span>
          </div>

          <div class="pt-1">
            <a class="text-base font-semibold text-primary hover:underline hover:text-primary/80 cursor-pointer transition-colors">Mot de passe oublié ?</a>
          </div>

          <button type="submit" 
                  [disabled]="loginForm.invalid || isLoading"
                  class="w-full h-[52px] bg-primary hover:bg-primary/90 text-white rounded-full text-base font-bold transition-all disabled:bg-slate-200 disabled:text-slate-500 mt-4 flex justify-center items-center gap-2">
            <span *ngIf="isLoading" class="loading loading-spinner loading-sm"></span>
            <span *ngIf="!isLoading">S'identifier</span>
            <span *ngIf="isLoading">Connexion...</span>
          </button>
        </form>

        <div class="relative flex items-center py-6">
          <div class="flex-grow border-t border-slate-300"></div>
          <span class="flex-shrink-0 mx-4 text-slate-500 text-sm font-medium">ou</span>
          <div class="flex-grow border-t border-slate-300"></div>
        </div>
        
        <div class="space-y-3">
          <button class="w-full h-[52px] rounded-full border border-slate-500 flex items-center justify-center gap-3 font-semibold text-slate-600 hover:bg-slate-50 hover:border-slate-700 transition-all">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"> Continuer avec Google
          </button>
        </div>

      </div>

      <p class="text-center mt-8 text-base text-slate-800">
        Nouveau sur BatiConnect ? 
        <a routerLink="/register" class="text-primary font-semibold hover:underline">S'inscrire</a>
      </p>

    </div>
  </div>
</div>
